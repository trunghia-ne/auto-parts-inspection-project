spring.application.name=auto-parts

# Database connection - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/auto_parts_inspection?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Hibernate/JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (dev settings)
# NOTE: Change this secret before any real deployment.
app.jwt.secret=PLEASE_CHANGE_THIS_DEV_SECRET_TO_A_LONG_RANDOM_STRING_32_CHARS_MIN
app.jwt.expiration-ms=86400000

# Inspection uploads
app.inspection.upload-dir=uploads/inspections