spring.application.name=auto-parts-test

spring.datasource.url=jdbc:h2:mem:auto_parts_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

app.jwt.secret=PLEASE_CHANGE_THIS_DEV_SECRET_TO_A_LONG_RANDOM_STRING_32_CHARS_MIN
app.jwt.expiration-ms=86400000
